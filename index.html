<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <title>Frontend Mentor | Social links profile</title>
</head>
<body>
  <main class="container">
      <div class="container-card">
        <img src="./images/avatar-cat.jpg" alt="Cat Avatar" class="card-avatar">
      <div class="container-author">
           <h1 class="card-title">Viktoriia Ruban</h1>
           <a href="https://maps.google.com/?q=Rivne,Ukraine" target="_blank" class="card-location">Rivne, Ukraine</a>
      </div>
           <p class="card-about">"Front-end developer and avid reader."</p>
      <ul class="card-links-group">
          <li><a href="https://github.com/toriruban" target="github-tab" class="card-link">GitHub</a></li>
          <li><a href="https://www.linkedin.com/in/viktoriia-ruban/" target="linkedin-tab" class="card-link">LinkedIn</a></li>
          <li><a href="https://www.frontendmentor.io/profile/toriruban" target="frontendmentor-tab" class="card-link">Frontend Mentor</a></li>
      </ul>     
      </div>
  </main>
</body>
</html>
